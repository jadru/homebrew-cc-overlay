name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the v prefix"
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run test suite
        run: swift test --disable-sandbox
      - name: Validate Formula syntax
        run: ruby -c Formula/cc-overlay.rb
      - name: Build and validate a release artifact
        run: VERSION=0.0.0 BUILD_NUMBER=0 SIGN_IDENTITY=- NOTARIZE=0 ARCHS=arm64 ./script/package_release.sh

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $VERSION" >&2; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Inject version metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i '' "s/static let version = \".*\"/static let version = \"${VERSION}\"/" Sources/CCOverlay/Models/Constants.swift
          plutil -replace CFBundleShortVersionString -string "$VERSION" Sources/CCOverlay/Info.plist
          plutil -replace CFBundleVersion -string "$GITHUB_RUN_NUMBER" Sources/CCOverlay/Info.plist

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$KEYCHAIN_PASSWORD" ]] || { echo "Developer ID signing secrets are required" >&2; exit 1; }
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Configure notarization profile
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          [[ -n "$APP_STORE_CONNECT_API_KEY" && -n "$APP_STORE_CONNECT_KEY_ID" && -n "$APP_STORE_CONNECT_ISSUER_ID" ]] || { echo "App Store Connect notarization secrets are required" >&2; exit 1; }
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY" | base64 -D > "$KEY_PATH"
          xcrun notarytool store-credentials "cc-overlay-notary" --key "$KEY_PATH" --key-id "$APP_STORE_CONNECT_KEY_ID" --issuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Package, sign, notarize, and validate
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_IDENTITY }}
          NOTARY_PROFILE: cc-overlay-notary
        run: ./script/package_release.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/release/CC-Overlay-v${{ steps.version.outputs.version }}-macos.zip
            dist/release/CC-Overlay-v${{ steps.version.outputs.version }}-macos.zip.sha256

      - name: Update Homebrew formula on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ARCHIVE="CC-Overlay-v${VERSION}-macos.zip"
          SHA256="$(awk '{print $1}' "dist/release/${ARCHIVE}.sha256")"
          git fetch origin main
          git checkout -B release-formula origin/main
          sed -i '' "s|url \".*\"|url \"https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${ARCHIVE}\"|" Formula/cc-overlay.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/cc-overlay.rb
          ruby -c Formula/cc-overlay.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cc-overlay.rb
          git diff --cached --quiet || git commit -m "formula: cc-overlay ${VERSION}"
          git push origin HEAD:main
